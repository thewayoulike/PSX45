name: Frequent Price Check
on:
  schedule:
    # UPDATED: This now runs every 5 minutes
    - cron: '*/5 4-11 * * 1-5'
  workflow_dispatch:

jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel API
        run: |
          # UPDATED: Corrected the URL to api/run-alerts
          curl -X GET "https://psx-45-naeh.vercel.app/api/run-alerts?secret=${{ secrets.CRON_SECRET }}"
