name: Frequent Price Check
on:
  schedule:
    # This runs every 10 minutes during PSX hours (approx 4:00-11:00 UTC)
    - cron: '*/10 4-11 * * 1-5'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel API
        run: |
          curl -X GET "https://your-app-name.vercel.app/api/check-prices" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
